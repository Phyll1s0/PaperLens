<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>论文阅读助手</title>
    <link rel="stylesheet" href="/public/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">PR</div>
          <div>
            <h1>论文阅读助手</h1>
            <p id="paperMeta">未载入论文</p>
          </div>
        </div>

        <section class="panel">
          <h2>模型</h2>
          <label>
            Provider
            <select id="providerSelect">
              <option value="deepseek">DeepSeek</option>
              <option value="claude-kimi-agent">Claude Code + Kimi Code Key</option>
              <option value="claude-local">Claude Code 本机配置</option>
              <option value="kimi-code">Kimi Code</option>
              <option value="kimi-platform">Kimi 开放平台</option>
              <option value="openai">OpenAI</option>
              <option value="custom">自定义</option>
            </select>
          </label>
          <label>
            Base URL
            <input id="baseUrlInput" type="url" autocomplete="off" value="https://api.openai.com/v1">
          </label>
          <label>
            Model
            <input id="modelInput" type="text" autocomplete="off" value="gpt-4.1-mini">
          </label>
          <label>
            API Key
            <input id="apiKeyInput" type="password" autocomplete="off">
          </label>
          <label>
            Agent Budget USD
            <input id="agentBudgetInput" type="number" min="0" step="1" value="500">
          </label>
          <label>
            Proxy URL
            <input id="proxyUrlInput" type="url" autocomplete="off" placeholder="可选，例如 http://127.0.0.1:7897">
          </label>
          <button id="pingButton" class="secondary-button full-width" type="button">测试连接</button>
          <p id="modelStatusText" class="status-text">尚未测试</p>
          <p id="modelDiagnosticsText" class="diagnostics-text"></p>
          <p id="providerHintText" class="diagnostics-text"></p>
        </section>

        <section class="panel">
          <h2>PDF</h2>
          <input id="pdfInput" class="file-input" type="file" accept="application/pdf,.pdf">
          <label class="check-row">
            <input id="aiSegmentInput" type="checkbox" checked>
            AI 分段
          </label>
          <label class="check-row">
            <input id="autoAnalyzeInput" type="checkbox" checked>
            上传后自动翻译讲解
          </label>
          <button id="uploadButton" class="primary-button" type="button">上传并解析</button>
          <p id="statusText" class="status-text">等待上传</p>
        </section>

        <section class="panel">
          <h2>最近</h2>
          <div id="paperList" class="paper-list"></div>
        </section>

        <nav class="outline" id="outline"></nav>
      </aside>

      <main class="reader">
        <div class="reader-toolbar">
          <div>
            <h2 id="paperTitle">选择一篇 PDF</h2>
            <p id="paperStats">段落会显示在这里</p>
          </div>
          <div class="toolbar-actions">
            <div class="toolbar-buttons">
              <button id="autoAnalyzeButton" class="secondary-button" type="button">自动翻译讲解</button>
              <button id="rerunAnalyzeButton" class="secondary-button" type="button">重新生成全部</button>
              <button id="stopAutoButton" class="secondary-button hidden" type="button">停止</button>
            </div>
            <div id="jobHistory" class="job-history"></div>
            <input id="searchInput" type="search" placeholder="搜索段落">
          </div>
        </div>

        <div id="emptyState" class="empty-state">
          <div class="empty-icon">PDF</div>
          <h2>上传论文开始阅读</h2>
        </div>

        <div id="paragraphList" class="paragraph-list"></div>
      </main>
    </div>

    <script type="module" src="/public/app.js"></script>
  </body>
</html>
