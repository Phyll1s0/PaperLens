services:
  paperlens:
    build: .
    image: paperlens:local
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PAPERLENS_PDF_ENGINE: poppler
      PAPERLENS_PROXY_URL: ${PAPERLENS_PROXY_URL:-}
      PAPERLENS_CLAUDE_CLI: ${PAPERLENS_CLAUDE_CLI:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      all_proxy: ${ALL_PROXY:-}
      no_proxy: ${NO_PROXY:-}
    ports:
      - "3000:3000"
    volumes:
      - paperlens_uploads:/app/uploads
      - paperlens_data:/app/data
      - paperlens_assets:/app/paper-assets
      - paperlens_cache:/app/.cache

volumes:
  paperlens_uploads:
  paperlens_data:
  paperlens_assets:
  paperlens_cache:
