services:
  paperlens:
    build: .
    image: paperlens:local
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PAPERLENS_ACCESS_TOKEN: ${PAPERLENS_ACCESS_TOKEN:-}
      PAPERLENS_SECRET_KEY: ${PAPERLENS_SECRET_KEY:-}
      PAPERLENS_PDF_ENGINE: poppler
      PAPERLENS_PROXY_URL: ${PAPERLENS_PROXY_URL:-}
      PAPERLENS_CLAUDE_CLI: ${PAPERLENS_CLAUDE_CLI:-}
      PAPERLENS_ANALYSIS_TARGET_MINUTES: ${PAPERLENS_ANALYSIS_TARGET_MINUTES:-20}
      PAPERLENS_ANALYSIS_BATCH_SIZE: ${PAPERLENS_ANALYSIS_BATCH_SIZE:-12}
      PAPERLENS_ANALYSIS_CONCURRENCY: ${PAPERLENS_ANALYSIS_CONCURRENCY:-3}
      PAPERLENS_AGENT_ANALYSIS_BATCH_SIZE: ${PAPERLENS_AGENT_ANALYSIS_BATCH_SIZE:-8}
      PAPERLENS_AGENT_ANALYSIS_CONCURRENCY: ${PAPERLENS_AGENT_ANALYSIS_CONCURRENCY:-2}
      PAPERLENS_ANALYSIS_FAILED_RETRY_BATCH_SIZE: ${PAPERLENS_ANALYSIS_FAILED_RETRY_BATCH_SIZE:-2}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      all_proxy: ${ALL_PROXY:-}
      no_proxy: ${NO_PROXY:-}
    ports:
      - "${PAPERLENS_PORT:-3000}:3000"
    volumes:
      - paperlens_uploads:/app/uploads
      - paperlens_data:/app/data
      - paperlens_assets:/app/paper-assets
      - paperlens_cache:/app/.cache
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  paperlens_uploads:
  paperlens_data:
  paperlens_assets:
  paperlens_cache:
